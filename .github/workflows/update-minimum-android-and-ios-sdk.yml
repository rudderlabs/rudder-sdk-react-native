name: Update Minimum Android and iOS SDK

on:
  workflow_dispatch:
    inputs:
      android_minimum_version:
        description: 'Android SDK Minimum Version'
        required: false
      ios_minimum_version:
        description: 'iOS SDK Minimum Version'
        required: false

jobs:
  update-versions:
    permissions:
      contents: read # GITHUB_TOKEN only needs read access, App Token handles all write operations
    name: Update Minimum Android and iOS SDK
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          repositories: rudder-sdk-react-native
          permission-contents: write # to create commits, tags, and releases
          permission-pull-requests: write # to create and update PRs

      - name: Checkout source branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Get Current Date
        run: echo "CURRENT_DATE=$(date +'%d%m%y')" >> $GITHUB_ENV

      - name: Create branch
        uses: peterjgrainger/action-create-branch@10c7d268152480ae859347db45dc69086cef1d9c # v3.0.0
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch: 'fix/updateMinimumSdkVersions-${{ env.CURRENT_DATE }}'

      - name: Change Git Branch
        run: |
          git fetch
          git checkout fix/updateMinimumSdkVersions-${{ env.CURRENT_DATE }}

      - name: Update Android SDK Version
        if: github.event.inputs.android_minimum_version != ''
        env:
          ANDROID_MIN_VERSION: ${{ github.event.inputs.android_minimum_version }}
        run: |
          sed -i "s/com.rudderstack.android.sdk:core:\[[0-9.]*,[0-9]*/com.rudderstack.android.sdk:core:\[$ANDROID_MIN_VERSION,/" libs/sdk/android/build.gradle

      - name: Update iOS SDK Version
        if: github.event.inputs.ios_minimum_version != ''
        env:
          IOS_MIN_VERSION: ${{ github.event.inputs.ios_minimum_version }}
        run: |
          sed -i "s/\"Rudder\", '[>= ]*[0-9.]*[0-9]*/\"Rudder\", '>= $IOS_MIN_VERSION/" libs/sdk/RNRudderSdk.podspec

      - name: Get list of changed files
        id: changed-files
        run: |
          # Get all changed files and format them for the signed commit action
          changed_files=$(git diff --name-only | tr '\n' '\n')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$changed_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build commit message
        id: commit-message
        env:
          ANDROID_VERSION: ${{ github.event.inputs.android_minimum_version }}
          IOS_VERSION: ${{ github.event.inputs.ios_minimum_version }}
        run: |
          msg="fix(rudder-sdk-react-native): update minimum SDK versions"
          if [ -n "$ANDROID_VERSION" ] && [ -n "$IOS_VERSION" ]; then
            msg="fix(rudder-sdk-react-native): update minimum Android and iOS SDK versions"
          elif [ -n "$ANDROID_VERSION" ]; then
            msg="fix(rudder-sdk-react-native): update minimum Android SDK versions"
          elif [ -n "$IOS_VERSION" ]; then
            msg="fix(rudder-sdk-react-native): update minimum iOS SDK versions"
          fi
          echo "message=$msg" >> $GITHUB_OUTPUT

      - name: Create verified commit via API
        uses: ryancyq/github-signed-commit@e9f3b28c80da7be66d24b8f501a5abe82a6b855f # v1.2.0
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch-name: fix/updateMinimumSdkVersions-${{ env.CURRENT_DATE }}
          commit-message: ${{ steps.commit-message.outputs.message }}
          files: ${{ steps.changed-files.outputs.files }}

      - name: Create pull request into develop
        uses: repo-sync/pull-request@7e79a9f5dc3ad0ce53138f01df2fad14a04831c5 # v2.12.1
        with:
          source_branch: fix/updateMinimumSdkVersions-${{ env.CURRENT_DATE }}
          destination_branch: 'develop'
          github_token: ${{ steps.generate-token.outputs.token }}
          pr_title: 'fix: update minimum SDKs version'
          pr_body: ':crown: *An automated PR*'
          pr_reviewer: '@rudderlabs/sdk-rn'
