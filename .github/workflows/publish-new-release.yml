name: Publish new github release

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: read # GITHUB_TOKEN only needs read access, App Token handles all write operations
    name: Publish new release
    runs-on: ubuntu-latest
    if: (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix-release/')) && github.event.pull_request.merged == true # only merged pull requests must trigger this job
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          repositories: rudder-sdk-react-native
          permission-contents: write # to create commits, tags, and releases
          permission-pull-requests: write # to create and update PRs

      - name: Extract version from branch name (for release branches)
        id: extract-version
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          VERSION="${BRANCH_NAME#hotfix-}"
          VERSION="${VERSION#release/}"

          echo "release_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Get the latest version tag
        id: extract-previous-version
        run: |
          TAGS=$(git tag --sort=-v:refname)
          TAGS_ARRAY=($TAGS)
          VERSION=${TAGS_ARRAY[0]}

          echo "previous_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install node_modules
        env:
          HUSKY: 0
        run: |
          npm run setup:ci

      # In order to make a commit, we need to initialize a user.
      # You may choose to write something less generic here if you want, it doesn't matter functionality wise.
      - name: Initialize mandatory git config
        run: |
          git config user.name "GitHub actions"
          git config user.email noreply@github.com

      # Sole creator of the monorepo v<version> tag (draft only creates per-package tags).
      # Idempotent: exits 0 if the tag already points at this commit, fails if it points
      # elsewhere so re-runs don't leave a mispointed tag.
      - name: Create Monorepo Release Tag via API
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          RELEASE_VERSION: ${{ steps.extract-version.outputs.release_version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          encoded=$(printf '%s' "v${RELEASE_VERSION}" | jq -sRr @uri)
          if existing_ref=$(gh api "repos/${REPOSITORY}/git/ref/tags/${encoded}" 2>/dev/null); then
            existing_type=$(printf '%s' "$existing_ref" | jq -r '.object.type')
            existing_obj=$(printf '%s' "$existing_ref" | jq -r '.object.sha')
            if [ "$existing_type" = "tag" ]; then
              existing_commit=$(gh api "repos/${REPOSITORY}/git/tags/${existing_obj}" --jq '.object.sha')
            else
              existing_commit="$existing_obj"
            fi
            if [ "$existing_commit" = "$COMMIT_SHA" ]; then
              echo "Tag v${RELEASE_VERSION} already points at ${COMMIT_SHA}, nothing to do"
              exit 0
            fi
            echo "::error::Tag v${RELEASE_VERSION} exists on origin but points at ${existing_commit} (expected ${COMMIT_SHA})"
            exit 1
          fi

          tag_obj_sha=$(gh api --method POST "repos/${REPOSITORY}/git/tags" \
            -f "tag=v${RELEASE_VERSION}" \
            -f "message=chore(monorepo): release v${RELEASE_VERSION}" \
            -f "object=${COMMIT_SHA}" \
            -f "type=commit" \
            --jq '.sha')

          gh api --method POST "repos/${REPOSITORY}/git/refs" \
            -f "ref=refs/tags/v${RELEASE_VERSION}" \
            -f "sha=${tag_obj_sha}"

      - name: Get the two latest versions
        run: |
          CURRENT_VERSION=$(git tag -l "v*" --sort=-version:refname | head -n 1)
          LAST_VERSION=$(git tag -l "v*" --sort=-version:refname | head -n 2 | awk 'NR == 2 { print $1 }')

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $LAST_VERSION"

          echo "current_version=$(echo $CURRENT_VERSION)" >> $GITHUB_ENV
          echo "last_version=$(echo $LAST_VERSION)" >> $GITHUB_ENV
          echo "DATE=$(date)" >> $GITHUB_ENV

      - name: Create GitHub Releases
        id: create_release
        continue-on-error: true
        env:
          HUSKY: 0
          # App token aliased onto GITHUB_TOKEN (the var nx reads); the job's default
          # token is contents:read and cannot create releases.
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          # nx treats package.json / package-lock.json changes as affecting every package.
          # Ignore them so only genuinely-changed packages get a GitHub release.
          # Ref: https://github.com/nrwl/nx/issues/15116#issuecomment-1535260119
          echo package-lock.json >> .nxignore
          echo package.json >> .nxignore
          npm run release:github -- --base=$last_version --head=$current_version
          # Restore working copy
          git checkout -- .nxignore

      # Reviewers are auto-requested via CODEOWNERS (* @rudderlabs/sdk-rn).
      # continue-on-error: a back-merge hiccup (e.g. PR already open) must not fail the
      # release after the GitHub releases are already published.
      - name: Create pull request into develop
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          RELEASE_VERSION: ${{ steps.extract-version.outputs.release_version }}
        run: |
          gh pr create \
            --base develop \
            --head master \
            --title "chore(release): pulling master into develop post release v$RELEASE_VERSION" \
            --body ":crown: *An automated PR*"

      - name: Delete hotfix release branch
        uses: koj-co/delete-merged-action@63a03c35810a8a7d4840d18793c0f68ff8b59450 # master
        if: startsWith(github.event.pull_request.head.ref, 'hotfix-release/')
        with:
          branches: 'hotfix-release/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete release branch
        uses: koj-co/delete-merged-action@63a03c35810a8a7d4840d18793c0f68ff8b59450 # master
        if: startsWith(github.event.pull_request.head.ref, 'release/')
        with:
          branches: 'release/*'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send message to Slack channel
        id: slack
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d  #v2.0.0
        env:
          PROJECT_NAME: 'React Native SDK monorepo'
          RELEASES_URL: 'https://github.com/rudderlabs/rudder-sdk-react-native/compare/'
        with:
          method: chat.postMessage
          payload-templated: true
          retries: rapid
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_RELEASE_CHANNEL_ID }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "New release: ${{ env.PROJECT_NAME }}"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release: <${{env.RELEASES_URL}}${{ steps.extract-previous-version.outputs.previous_version }}...v${{ steps.extract-version.outputs.release_version }}|v${{ steps.extract-version.outputs.release_version }}>*\n${{ env.DATE }}"
                  }
                }
              ]
            }
