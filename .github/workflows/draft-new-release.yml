name: Draft new release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  draft-new-release:
    permissions:
      contents: read # GITHUB_TOKEN only needs read access, App Token handles all write operations
    name: Draft a new release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/develop') || startsWith(github.ref, 'refs/heads/hotfix/')
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          repositories: rudder-sdk-react-native
          permission-contents: write # to create commits, tags, and releases
          permission-pull-requests: write # to create and update PRs

      - name: Checkout source branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install node_modules
        env:
          HUSKY: 0
        run: |
          npm run setup:ci

      # Git needs an author identity for the merge/version steps below.
      - name: Initialize mandatory git config
        run: |
          git config user.name "GitHub actions"
          git config user.email noreply@github.com

      # Calculate the next release version based on conventional semantic release
      - name: Create release branch
        id: create-release
        env:
          HUSKY: 0
        run: |
          source_branch_name=${GITHUB_REF##*/}
          release_type=release
          grep -q "hotfix/" <<< "${GITHUB_REF}" && release_type=hotfix-release
          git fetch origin master --depth=1
          git merge origin/master
          current_version=$(jq -r .version package.json)

          npm run bump-version:monorepo
          new_version=$(jq -r .version package.json)
          git reset --hard

          branch_name="${release_type}/${new_version}"

          echo "Source branch for new release is $source_branch_name"
          echo "Current version is $current_version"
          echo "Release type is $release_type"
          echo "New version is $new_version"
          echo "New release branch name is $branch_name"
          git checkout -b "$branch_name"

          echo "source_branch_name=$source_branch_name" >> $GITHUB_OUTPUT
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "CURRENT_VERSION_VALUE=$current_version" >> $GITHUB_ENV
          echo "NEW_VERSION_VALUE=$new_version" >> $GITHUB_ENV

      # The signed-commit action requires the branch to exist on the remote.
      # Idempotent: update the ref if it already exists (e.g. a re-run), create it otherwise.
      - name: Create release branch via API
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          BRANCH_NAME: ${{ steps.create-release.outputs.branch_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          if gh api "repos/$REPOSITORY/git/ref/heads/$BRANCH_NAME" >/dev/null 2>&1; then
            gh api "repos/$REPOSITORY/git/refs/heads/$BRANCH_NAME" \
              --method PATCH \
              -f sha="$BASE_SHA" \
              -F force=true
          else
            gh api "repos/$REPOSITORY/git/refs" \
              --method POST \
              -f ref="refs/heads/$BRANCH_NAME" \
              -f sha="$BASE_SHA"
          fi

      - name: Update changelog & bump version
        id: finish-release
        # We need master history that contains all previous tags commit reference
        run: |
          echo "Current version: $CURRENT_VERSION_VALUE"
          echo "New version: $NEW_VERSION_VALUE"
          git fetch --no-tags --prune --depth=100 origin master
          npm run release -- --skipCommit=true
          ./scripts/sync-tags-in-nx-projects.sh
          ./scripts/generate-last-release-changelog.sh
          ./scripts/update-rn-sdk-version-in-constants-file.sh
          npm run bump-version:monorepo
          npx replace $CURRENT_VERSION_VALUE $NEW_VERSION_VALUE sonar-project.properties
          npm i

      # semver runs with --skipCommit=true, so it stages the version/changelog changes
      # without committing. This action packages all working-tree changes (files: .) into
      # one verified commit on the release branch.
      - name: Create verified commit via API
        uses: ryancyq/github-signed-commit@6afa32d8aa9819faddc248e6258e9c11ec05ecc8 # v1.4.0
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          branch-name: ${{ steps.create-release.outputs.branch_name }}
          commit-message: 'chore: sync versions and generate release logs'
          files: |
            .

      # Create per-package tags (rudder-sdk-react-native@x.y.z, etc.) at the release
      # branch HEAD for packages whose version changed. The monorepo v<version> tag is
      # created by publish-new-release.yml instead. Idempotent: skips if the tag already
      # points at the release SHA, fails if it points elsewhere.
      - name: Push release tags to release branch HEAD
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          BRANCH_NAME: ${{ steps.create-release.outputs.branch_name }}
          REPO: ${{ github.repository }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git fetch --no-tags origin master
          release_sha=$(git rev-parse "origin/$BRANCH_NAME")
          echo "Release branch HEAD: $release_sha"

          for pj in libs/*/project.json libs/plugins/*/project.json; do
            tag=$(jq -r '.targets.github.options.tag // empty' "$pj")
            [ -z "$tag" ] && continue

            pkg_dir=$(dirname "$pj")
            current_version=$(git show "origin/${BRANCH_NAME}:${pkg_dir}/package.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || echo "")
            prev_version=$(git show "origin/master:${pkg_dir}/package.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || echo "")

            if [ -z "$current_version" ]; then
              echo "::error::Unable to read version for ${pkg_dir}; refusing to tag ${tag}"
              exit 1
            fi

            if [ -n "$prev_version" ] && [ "$current_version" = "$prev_version" ]; then
              echo "Skipping ${tag} — version unchanged vs origin/master"
              continue
            fi

            encoded=$(printf '%s' "$tag" | jq -sRr @uri)
            if existing_ref=$(gh api "repos/${REPO}/git/ref/tags/${encoded}" 2>/dev/null); then
              existing_type=$(printf '%s' "$existing_ref" | jq -r '.object.type')
              existing_obj=$(printf '%s' "$existing_ref" | jq -r '.object.sha')
              if [ "$existing_type" = "tag" ]; then
                existing_commit=$(gh api "repos/${REPO}/git/tags/${existing_obj}" --jq '.object.sha')
              else
                existing_commit="$existing_obj"
              fi
              if [ "$existing_commit" = "$release_sha" ]; then
                echo "Tag ${tag} already points at ${release_sha}, skipping"
                continue
              fi
              echo "::error::Tag ${tag} exists on origin but points at ${existing_commit} (expected ${release_sha})"
              exit 1
            fi

            echo "Creating annotated tag ${tag} -> ${release_sha}"

            pkg_scope="${tag%@*}"
            pkg_version="${tag##*@}"

            tag_obj_sha=$(gh api --method POST "repos/${REPO}/git/tags" \
              -f "tag=${tag}" \
              -f "message=chore(${pkg_scope}): release version ${pkg_version}" \
              -f "object=${release_sha}" \
              -f "type=commit" \
              --jq '.sha')

            gh api --method POST "repos/${REPO}/git/refs" \
              -f "ref=refs/tags/${tag}" \
              -f "sha=${tag_obj_sha}"
          done

      # Reviewers are auto-requested via CODEOWNERS (* @rudderlabs/sdk-rn).
      # Idempotent: skip if a PR for this branch already exists (e.g. a re-run).
      - name: Create pull request into master
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          BRANCH_NAME: ${{ steps.create-release.outputs.branch_name }}
        run: |
          existing=$(gh pr list --head "$BRANCH_NAME" --base master --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #$existing from $BRANCH_NAME into master already exists; skipping"
          else
            gh pr create \
              --base master \
              --head "$BRANCH_NAME" \
              --title "chore(release): pulling $BRANCH_NAME into master" \
              --body ":crown: *An automated PR*"
          fi
